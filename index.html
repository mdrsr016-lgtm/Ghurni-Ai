<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghurni Ai</title>
    <!-- Tailwind CSS (CDN kept for style consistency without build complexity) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Global Smooth Scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Refined, Modern Scrollbar (Mac-OS style) */
      ::-webkit-scrollbar {
        width: 12px; /* Slightly wider to accommodate border padding */
        height: 12px;
      }
      
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      
      ::-webkit-scrollbar-thumb {
        background-color: rgba(156, 163, 175, 0.4); /* Subtle gray */
        border-radius: 9999px; /* Pill shape */
        border: 4px solid rgba(0, 0, 0, 0); /* Transparent border creates padding */
        background-clip: content-box; /* Clips background to inside the border */
        transition: background-color 0.3s ease;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(107, 114, 128, 0.8); /* Darker on hover */
        border: 3px solid rgba(0, 0, 0, 0); /* Slightly larger thumb on hover */
      }

      /* Firefox scrollbar support */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(156, 163, 175, 0.5) transparent;
      }
      
      .gradient-text {
        background: linear-gradient(90deg, #6366f1 0%, #d946ef 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .gradient-btn {
        background: linear-gradient(90deg, #ff512f 0%, #dd2476 100%);
      }

      /* Professional Animations */
      :root {
        /* Smooth, snappy easing similar to iOS */
        --ease-professional: cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.6s var(--ease-professional) forwards;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.7s var(--ease-professional) forwards;
      }

      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(15px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .animate-slide-right {
        animation: slideInRight 0.5s var(--ease-professional) forwards;
      }

      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-15px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .animate-slide-left {
        animation: slideInLeft 0.5s var(--ease-professional) forwards;
      }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in {
        animation: scaleIn 0.5s var(--ease-professional) forwards;
      }

      /* Stagger Delays */
      .animation-delay-75 { animation-delay: 75ms; }
      .animation-delay-100 { animation-delay: 100ms; }
      .animation-delay-150 { animation-delay: 150ms; }
      .animation-delay-200 { animation-delay: 200ms; }
      .animation-delay-300 { animation-delay: 300ms; }
      .animation-delay-400 { animation-delay: 400ms; }
      .animation-delay-500 { animation-delay: 500ms; }
    </style>
<script type="importmap">
{
  "imports": {

  }
}
</script>
</head>
