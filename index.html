<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghurni Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
        "vite": "https://aistudiocdn.com/vite@^7.2.4",
        "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
      }
    }
    </script>
    <style>
      /* Professional Reset & Base Styles */
      :root {
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        --gradient-blur: 0px;
      }
      
      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #000000;
        color: #ffffff;
        margin: 0;
      }

      /* Premium Mesh Gradient */
      .mesh-gradient-bg {
        background-color: #000000;
        background-image: 
          radial-gradient(at 3% 80%, #181c4f 0px, transparent 50%), 
          radial-gradient(at 1% 99%, #30184f 0px, transparent 50%), 
          radial-gradient(at 56% 26%, #4b184f 0px, transparent 50%), 
          radial-gradient(at 87% 44%, #4f4b18 0px, transparent 50%), 
          radial-gradient(at 11% 44%, #1c4f18 0px, transparent 50%);
        background-attachment: fixed;
        background-size: cover;
      }

      .frosted-backdrop {
        backdrop-filter: blur(var(--gradient-blur)) contrast(100%) brightness(100%);
        -webkit-backdrop-filter: blur(var(--gradient-blur)) contrast(100%) brightness(100%);
      }

      /* Clean Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
