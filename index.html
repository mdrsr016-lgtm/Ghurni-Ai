<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghurni Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importing Inter for modern UI and Bodoni Moda for display -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bodoni+Moda:opsz,wght@6..96,400..900&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            screens: {
              xs: "320px", // Small Phones
              sm: "375px", // Medium Phones
              "phone-lg": "425px", // Large Phones / Phablets
              "tab-sm": "600px", // Small Tablets
              tab: "769px", // Standard Tablets (iPad Portrait) - Revised Start
              "tab-lg": "1024px", // Large Tablets (iPad Pro Portrait)
              laptop: "1280px", // Small Laptops / iPad Pro Landscape
              desktop: "1440px", // Standard Desktops
              wide: "1920px", // Large / Ultra-Wide
              "4k": "2560px", // 4K Displays
              "5k": "3840px", // 5K & Ultra screens
            },
            fontFamily: {
              sans: [
                "Inter",
                "system-ui",
                "-apple-system",
                "BlinkMacSystemFont",
                "Segoe UI",
                "Roboto",
                "sans-serif",
              ],
              // Maps to local 'Caviler' first, then 'Bodoni Moda' as web fallback
              caviler: ["Caviler", "Bodoni Moda", "serif"],
            },
          },
        },
      };
    </script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.7",
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
          "vite": "https://aistudiocdn.com/vite@^7.2.4",
          "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
        }
      }
    </script>
    <style>
      /* Professional Reset & Base Styles */
      :root {
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, "Helvetica Neue", Arial, sans-serif;
        --glass-border: rgba(255, 255, 255, 0.1);
        --glass-bg: rgba(0, 0, 0, 0.2);
        --glass-highlight: rgba(255, 255, 255, 0.05);
        /* Premium 'Quintic' Ease Out for luxurious motion */
        --ease-premium: cubic-bezier(0.23, 1, 0.32, 1);
      }

      html {
        scroll-behavior: smooth;
        height: 100%;
      }

      body {
        font-family: 'Inter', var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #000000;
        color: #ffffff;
        margin: 0;
        height: 100%;
      }

      /* Safe area padding for devices with notches/home indicators */
      .safe-area-pb {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* 
         Setup for local Caviler font file. 
         In a real project, place the font files in /public/fonts/ 
      */
      @font-face {
        font-family: "Caviler";
        src: url("/fonts/caviler.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      /* Explicit Font Override */
      .font-caviler {
        font-family: "Caviler", "Bodoni Moda", serif !important;
      }

      /* Premium Mesh Gradient */
      .mesh-gradient-bg {
        background-color: #000000;
        background-image: radial-gradient(
            at 3% 80%,
            #181c4f 0px,
            transparent 50%
          ),
          radial-gradient(at 1% 99%, #30184f 0px, transparent 50%),
          radial-gradient(at 56% 26%, #4b184f 0px, transparent 50%),
          radial-gradient(at 87% 44%, #4f4b18 0px, transparent 50%),
          radial-gradient(at 11% 44%, #1c4f18 0px, transparent 50%);
        background-attachment: fixed;
        background-size: cover;
      }

      /* Glassmorphism Utilities */
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
      }

      .text-gradient {
        background: linear-gradient(135deg, #fff 0%, #ffffff80 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in-up {
        opacity: 0; /* Ensure it starts hidden */
        animation: fadeInUp 1s var(--ease-premium) forwards;
      }

      @keyframes fadeInScale {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .animate-fade-in-scale {
        animation: fadeInScale 0.4s var(--ease-premium) forwards;
      }

      /* Mobile Drawer Animation */
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .animate-slide-in-left {
        animation: slideInLeft 0.3s var(--ease-premium) forwards;
      }

      /* Responsive Card Entrance Animations */
      /* Mobile: Slide Up from Bottom */
      @keyframes slideInUpMobile {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Desktop: Slide Left from Right */
      @keyframes slideInRightDesktop {
        from {
          opacity: 0;
          transform: translateX(60px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .animate-card-entry {
        opacity: 0; /* Start hidden to avoid flash */
        will-change: transform, opacity;
        animation: slideInUpMobile 1.2s var(--ease-premium) forwards;
      }

      @media (min-width: 1280px) {
        .animate-card-entry {
          /* Desktop: Slide Left (from Right) */
          animation-name: slideInRightDesktop;
          animation-duration: 1.4s; /* Slightly slower on large screens for grandeur */
        }
      }

      .animate-delay-100 {
        animation-delay: 100ms;
      }
      .animate-delay-200 {
        animation-delay: 200ms;
      }
      .animate-delay-300 {
        animation-delay: 300ms;
      }
      .animate-delay-400 {
        animation-delay: 400ms;
      }
      .animate-delay-500 {
        animation-delay: 500ms;
      }

      /* Staggered Feed Animation */
      @keyframes feedSlideIn {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .animate-feed-item {
        opacity: 0;
        animation: feedSlideIn 0.6s var(--ease-premium) forwards;
      }

      /* Story Card Animation */
      @keyframes storyPop {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .animate-story {
        opacity: 0;
        animation: storyPop 0.4s var(--ease-premium) forwards;
      }

      /* Gradient Ring Animation for Stories */
      @keyframes gradientRotate {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      .gradient-ring {
        background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #f5576c, #667eea);
        background-size: 400% 400%;
        animation: gradientRotate 3s ease infinite;
      }

      /* Status Icons Animations */
      @keyframes pulseGlow {
        0% {
          filter: drop-shadow(0 0 0 rgba(74, 222, 128, 0));
          transform: scale(1);
        }
        50% {
          filter: drop-shadow(0 0 5px rgba(74, 222, 128, 0.5));
          transform: scale(1.1);
        }
        100% {
          filter: drop-shadow(0 0 0 rgba(74, 222, 128, 0));
          transform: scale(1);
        }
      }
      .animate-pulse-glow {
        animation: pulseGlow 2s infinite ease-in-out;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-3px);
        }
        75% {
          transform: translateX(3px);
        }
      }
      .animate-shake {
        animation: shake 0.4s ease-in-out;
      }

      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .animate-zoom-in {
        animation: zoomIn 0.3s var(--ease-premium) forwards;
      }

      /* Phone Input Custom Styles */
      .PhoneInput {
        position: relative;
      }

      .PhoneInput .PhoneInputCountry {
        position: absolute;
        left: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        pointer-events: auto;
      }

      .PhoneInput .PhoneInputCountrySelect {
        background: transparent;
        border: none;
        color: white;
        cursor: pointer;
        padding: 0.25rem;
        border-radius: 0.375rem;
      }

      .PhoneInput .PhoneInputCountrySelect:focus {
        outline: 2px solid rgb(139 92 246);
        outline-offset: 2px;
      }

      .PhoneInput .PhoneInputCountryIcon {
        width: 1.25rem;
        height: 1.25rem;
        margin-right: 0.25rem;
      }

      .PhoneInput .PhoneInputInput {
        /* Input styles are handled by numberInputProps */
      }

      /* Hide Scrollbar Globally */
      * {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }

      *::-webkit-scrollbar {
        display: none; /* Chrome, Safari and Opera */
        width: 0;
        height: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
