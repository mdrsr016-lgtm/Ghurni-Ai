<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Checkbox</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
      }

      .demo-wrapper {
        background: white;
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      h1 {
        margin: 0 0 2rem 0;
        color: #333;
        font-size: 1.8rem;
        font-weight: 600;
      }

      .container {
        cursor: pointer;
      }

      .container input {
        display: none;
      }

      .container svg {
        overflow: visible;
      }

      .box {
        fill: transparent;
        stroke: green;
        stroke-width: 4;
        rx: 10;
      }

      .container input:checked ~ svg .box {
        fill: rgba(0, 128, 0, 0.1);
        transition: fill 0.3s ease;
      }

      .path {
        fill: none;
        stroke: green;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke-dasharray 0.5s ease;
        stroke-dasharray: 0 0 240 9999999;
        stroke-dashoffset: 1;
        scale: -1 1;
        transform-origin: center;
        animation: hi 0.5s;
        opacity: 0;
      }

      .container input:checked ~ svg .path {
        stroke-dasharray: 0 262 70 9999999;
        transition-delay: 0s;
        scale: 1 1;
        animation: none;
        opacity: 1;
      }

      @keyframes hi {
        0% {
          stroke-dashoffset: 20;
        }
        to {
          stroke-dashoffset: 1;
        }
      }

      .instruction {
        margin-top: 1.5rem;
        color: #666;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>Animated Checkbox</h1>

      <label class="container">
        <input type="checkbox" />
        <svg width="100" height="100" viewBox="0 0 100 100">
          <rect class="box" x="10" y="10" width="80" height="80" rx="10"></rect>
          <path class="path" d="M 20 50 L 40 70 L 80 30"></path>
        </svg>
      </label>

      <p class="instruction">Click the checkbox to see the animation</p>
    </div>
  </body>
</html>
